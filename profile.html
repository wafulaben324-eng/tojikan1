<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOJI-KAN Hospital | Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7fc;
            color: #1e2a3e;
        }

        /* Navbar */
        .navbar {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo i {
            background: none;
            color: #2c6e9e;
            margin-right: 6px;
        }

        .nav-center {
            flex: 1;
            max-width: 400px;
            margin: 0 2rem;
        }

        .search-bar {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .search-bar i {
            color: #5a6e85;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
        }

        .nav-right {
            display: flex;
            gap: 1rem;
        }

        .nav-icon {
            width: 42px;
            height: 42px;
            background: #f0f4fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-icon:hover {
            background: #e2e8f0;
        }

        /* Profile menu */
        .profile-menu {
            position: absolute;
            top: 75px;
            right: 2rem;
            background: white;
            width: 280px;
            border-radius: 20px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 1rem;
            display: none;
            z-index: 200;
        }

        .profile-menu.show {
            display: block;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eef2f6;
        }

        .profile-header i {
            font-size: 2.5rem;
            color: #2c6e9e;
        }

        .profile-name {
            font-weight: 700;
        }

        .profile-email {
            font-size: 0.75rem;
            color: #5f7f9e;
        }

        .profile-menu-items a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            color: #1e2a3e;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.1s;
            cursor: pointer;
        }

        .profile-menu-items a:hover {
            background: #f0f6fe;
        }

        .divider {
            height: 1px;
            background: #edf2f7;
            margin: 8px 0;
        }

        /* Main Tabs */
        .main-tabs {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 2rem;
        }

        .tabs-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 2rem;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 1rem 0;
            font-weight: 500;
            color: #5a6e85;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }

        .tab.active {
            color: #1e5b9e;
            border-bottom-color: #1e5b9e;
        }

        .tab:hover:not(.active) {
            color: #2c3e66;
            border-bottom-color: #cbd5e1;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .settings-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 2rem;
        }
        
        .settings-header h1 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }
        
        .settings-content {
            padding: 2rem;
        }
        
        .settings-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .settings-section:last-child {
            border-bottom: none;
        }
        
        .settings-section h2 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        
        .setting-item {
            margin-bottom: 1rem;
        }
        
        .setting-item label {
            display: block;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .setting-item input,
        .setting-item select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }
        
        .setting-item input:focus,
        .setting-item select:focus {
            border-color: #2a5298;
            outline: none;
        }
        
        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .toggle-switch:last-child {
            border-bottom: none;
        }
        
        .toggle-switch label {
            font-weight: 500;
            color: #2c3e50;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #2a5298;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #2c3e50;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .danger-zone {
            background: #fee;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .danger-zone h3 {
            color: #e74c3c;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .danger-zone p {
            margin-bottom: 1rem;
            color: #666;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e293b;
            color: white;
            padding: 12px 22px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .tabs-container {
                gap: 1rem;
            }
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="navigateTo('home.html')">
            <i class="fas fa-hospital-alt"></i> TOJI-KAN
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="showToast('🔍 Search functionality coming soon')">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search..." readonly>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-icon profile-icon" onclick="toggleProfileMenu()">
                <i class="far fa-user-circle"></i>
            </div>
        </div>
    </div>
    
    <div class="profile-menu" id="profileMenu">
        <div class="profile-header">
            <i class="fas fa-user-md"></i>
            <div>
                <div class="profile-name" id="profileName">Loading...</div>
                <div class="profile-email" id="profileEmail">Loading...</div>
            </div>
        </div>
        <div class="profile-menu-items">
            <a onclick="showToast('Profile section')"><i class="fas fa-user"></i> My Profile</a>
            <div class="divider"></div>
            <a onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</div>

<div class="main-tabs">
    <div class="tabs-container">
        <div class="tab" onclick="navigateTo('home.html')"><i class="fas fa-chart-pie"></i> Dashboard</div>
        <div class="tab" onclick="navigateTo('patients.html')"><i class="fas fa-users"></i> Patients</div>
        <div class="tab" onclick="navigateTo('staff.html')"><i class="fas fa-user-md"></i> Staff</div>
        <div class="tab" onclick="navigateTo('wards.html')"><i class="fas fa-procedures"></i> Wards</div>
        <div class="tab" onclick="navigateTo('appointments.html')"><i class="fas fa-calendar-check"></i> Appointments</div>
        <div class="tab" onclick="navigateTo('billing.html')"><i class="fas fa-file-invoice-dollar"></i> Billing</div>
    </div>
</div>

<main class="container">
    <div class="settings-container">
        <div class="settings-header">
            <h1><i class="fas fa-cog"></i> System Settings</h1>
        </div>
        
        <div class="settings-content">
            <!-- General Settings -->
            <div class="settings-section">
                <h2><i class="fas fa-globe"></i> General Settings</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Hospital Name</label>
                        <input type="text" id="hospitalName" value="TOJI-KAN Private Hospital">
                    </div>
                    <div class="setting-item">
                        <label>Hospital Email</label>
                        <input type="email" id="hospitalEmail" value="info@togikan.com">
                    </div>
                    <div class="setting-item">
                        <label>Phone Number</label>
                        <input type="tel" id="hospitalPhone" value="+254 712 345 678">
                    </div>
                    <div class="setting-item">
                        <label>Address</label>
                        <input type="text" id="hospitalAddress" value="123 Healthcare Avenue, Nairobi">
                    </div>
                </div>
            </div>
            
            <!-- Notification Settings -->
            <div class="settings-section">
                <h2><i class="fas fa-bell"></i> Notifications</h2>
                <div class="toggle-switch">
                    <label>Email Notifications</label>
                    <label class="switch">
                        <input type="checkbox" id="emailNotifications" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-switch">
                    <label>SMS Notifications</label>
                    <label class="switch">
                        <input type="checkbox" id="smsNotifications">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-switch">
                    <label>Appointment Reminders</label>
                    <label class="switch">
                        <input type="checkbox" id="appointmentReminders" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <!-- Security Settings -->
            <div class="settings-section">
                <h2><i class="fas fa-lock"></i> Security</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password">
                    </div>
                    <div class="setting-item">
                        <label>New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password">
                    </div>
                    <div class="setting-item">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    </div>
                    <div class="setting-item">
                        <label>Two-Factor Authentication</label>
                        <select id="twoFactorAuth">
                            <option value="disabled">Disabled</option>
                            <option value="sms">SMS</option>
                            <option value="email">Email</option>
                            <option value="app">Authenticator App</option>
                        </select>
                    </div>
                </div>
                <button class="btn-primary" onclick="changePassword()" style="margin-top: 1rem;">
                    <i class="fas fa-key"></i> Update Password
                </button>
            </div>
            
            <!-- Backup Settings -->
            <div class="settings-section">
                <h2><i class="fas fa-database"></i> Backup</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Auto Backup Frequency</label>
                        <select id="backupFrequency">
                            <option value="daily">Daily</option>
                            <option value="weekly" selected>Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="never">Never</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Last Backup</label>
                        <input type="text" id="lastBackup" value="2024-03-30 10:30 AM" readonly>
                    </div>
                </div>
                <button class="btn-primary" onclick="backupNow()" style="margin-top: 1rem;">
                    <i class="fas fa-sync"></i> Backup Now
                </button>
            </div>
            
            <!-- Danger Zone -->
            <div class="danger-zone">
                <h3><i class="fas fa-exclamation-triangle"></i> Danger Zone</h3>
                <p>These actions are irreversible. Please be careful.</p>
                <button class="btn-danger" onclick="resetSystem()">
                    <i class="fas fa-trash"></i> Reset All Data
                </button>
            </div>
            
            <!-- Save Buttons -->
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button class="btn-secondary" onclick="navigateTo('home.html')">Cancel</button>
                <button class="btn-primary" onclick="saveSettings()">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </div>
    </div>
</main>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCkkqW21TMAy4NSA217k_fovsdavkF06s",
    authDomain: "tojikan-hospital.firebaseapp.com",
    projectId: "tojikan-hospital",
    storageBucket: "tojikan-hospital.firebasestorage.app",
    messagingSenderId: "1065678945107",
    appId: "1:1065678945107:web:cd95704090e3306b5ebfa6",
    measurementId: "G-MJ1SSXKFWQ"
  };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2500);
    }
    window.showToast = showToast;

    window.navigateTo = function(page) {
        window.location.href = page;
    };

    async function loadSettings() {
        try {
            const settingsRef = doc(db, "settings", "hospitalSettings");
            const settingsDoc = await getDoc(settingsRef);
            
            if (settingsDoc.exists()) {
                const data = settingsDoc.data();
                if (document.getElementById('hospitalName')) document.getElementById('hospitalName').value = data.hospitalName || 'TOJI-KAN Private Hospital';
                if (document.getElementById('hospitalEmail')) document.getElementById('hospitalEmail').value = data.hospitalEmail || 'info@togikan.com';
                if (document.getElementById('hospitalPhone')) document.getElementById('hospitalPhone').value = data.hospitalPhone || '+254 712 345 678';
                if (document.getElementById('hospitalAddress')) document.getElementById('hospitalAddress').value = data.hospitalAddress || '123 Healthcare Avenue, Nairobi';
                if (document.getElementById('emailNotifications')) document.getElementById('emailNotifications').checked = data.emailNotifications !== false;
                if (document.getElementById('smsNotifications')) document.getElementById('smsNotifications').checked = data.smsNotifications || false;
                if (document.getElementById('appointmentReminders')) document.getElementById('appointmentReminders').checked = data.appointmentReminders !== false;
                if (document.getElementById('backupFrequency')) document.getElementById('backupFrequency').value = data.backupFrequency || 'weekly';
                if (document.getElementById('twoFactorAuth')) document.getElementById('twoFactorAuth').value = data.twoFactorAuth || 'disabled';
            }
        } catch (error) {
            console.error("Error loading settings:", error);
        }
    }

    window.saveSettings = async function() {
        try {
            const settingsData = {
                hospitalName: document.getElementById('hospitalName').value,
                hospitalEmail: document.getElementById('hospitalEmail').value,
                hospitalPhone: document.getElementById('hospitalPhone').value,
                hospitalAddress: document.getElementById('hospitalAddress').value,
                emailNotifications: document.getElementById('emailNotifications').checked,
                smsNotifications: document.getElementById('smsNotifications').checked,
                appointmentReminders: document.getElementById('appointmentReminders').checked,
                backupFrequency: document.getElementById('backupFrequency').value,
                twoFactorAuth: document.getElementById('twoFactorAuth').value,
                updatedAt: new Date().toISOString(),
                updatedBy: auth.currentUser?.email
            };
            
            await setDoc(doc(db, "settings", "hospitalSettings"), settingsData);
            showToast('✅ Settings saved successfully!');
        } catch (error) {
            console.error("Error saving settings:", error);
            showToast('❌ Error saving settings');
        }
    };

    window.changePassword = async function() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!currentPassword || !newPassword) {
            showToast('Please enter current and new password');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showToast('New passwords do not match');
            return;
        }
        
        if (newPassword.length < 6) {
            showToast('Password must be at least 6 characters');
            return;
        }
        
        try {
            const user = auth.currentUser;
            const credential = EmailAuthProvider.credential(user.email, currentPassword);
            await reauthenticateWithCredential(user, credential);
            await updatePassword(user, newPassword);
            
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            showToast('✅ Password updated successfully!');
        } catch (error) {
            console.error("Error updating password:", error);
            if (error.code === 'auth/wrong-password') {
                showToast('Current password is incorrect');
            } else {
                showToast('Error updating password: ' + error.message);
            }
        }
    };

    window.backupNow = async function() {
        showToast('📦 Starting backup...');
        
        try {
            const collections = ['patients', 'staff', 'wards', 'appointments', 'bills', 'users'];
            const backupData = {};
            
            for (const collectionName of collections) {
                const snapshot = await getDocs(collection(db, collectionName));
                backupData[collectionName] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            }
            
            const backupBlob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
            const backupUrl = URL.createObjectURL(backupBlob);
            const a = document.createElement('a');
            a.href = backupUrl;
            a.download = `togikan_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(backupUrl);
            
            await setDoc(doc(db, "settings", "backupHistory"), {
                lastBackup: new Date().toISOString(),
                collections: Object.keys(backupData),
                size: backupBlob.size
            }, { merge: true });
            
            document.getElementById('lastBackup').value = new Date().toLocaleString();
            showToast('✅ Backup completed! File downloaded.');
        } catch (error) {
            console.error("Backup error:", error);
            showToast('❌ Backup failed');
        }
    };

    window.resetSystem = async function() {
        const confirmText = prompt('⚠️ WARNING: This will delete ALL data. Type "CONFIRM" to proceed:');
        
        if (confirmText !== 'CONFIRM') {
            showToast('Reset cancelled');
            return;
        }
        
        const secondConfirm = confirm('Are you absolutely sure? This action cannot be undone.');
        if (!secondConfirm) return;
        
        try {
            const collections = ['patients', 'staff', 'wards', 'appointments', 'bills'];
            
            for (const collectionName of collections) {
                const snapshot = await getDocs(collection(db, collectionName));
                for (const docSnapshot of snapshot.docs) {
                    await deleteDoc(doc(db, collectionName, docSnapshot.id));
                }
            }
            
            showToast('✅ System reset completed. All data has been deleted.');
            setTimeout(() => navigateTo('home.html'), 2000);
        } catch (error) {
            console.error("Reset error:", error);
            showToast('❌ Error resetting system');
        }
    };

    window.toggleProfileMenu = function() {
        document.getElementById('profileMenu').classList.toggle('show');
    };

    window.logoutUser = async function() {
        if (confirm('Are you sure you want to logout?')) {
            await signOut(auth);
            sessionStorage.removeItem('togikan_currentUser');
            window.location.href = 'index.html';
        }
    };

    function updateUserProfile(user) {
        document.getElementById('profileName').textContent = user.displayName || user.email.split('@')[0];
        document.getElementById('profileEmail').textContent = user.email;
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'index.html';
        } else {
            updateUserProfile(user);
            loadSettings();
        }
    });

    document.addEventListener('click', (e) => {
        const menu = document.getElementById('profileMenu');
        if (menu && !e.target.closest('.profile-icon') && !e.target.closest('#profileMenu')) {
            menu.classList.remove('show');
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('profileMenu').classList.remove('show');
        }
    });
    
    window.saveSettings = saveSettings;
    window.changePassword = changePassword;
    window.backupNow = backupNow;
    window.resetSystem = resetSystem;
    window.toggleProfileMenu = toggleProfileMenu;
    window.logoutUser = logoutUser;
    window.navigateTo = navigateTo;
</script>
</body>
</html>
