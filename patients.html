<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOJI-KAN Hospital | Patients</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7fc;
            color: #1e2a3e;
        }

        /* Navbar */
        .navbar {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo i {
            background: none;
            color: #2c6e9e;
            margin-right: 6px;
        }

        .nav-center {
            flex: 1;
            max-width: 400px;
            margin: 0 2rem;
        }

        .search-bar {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .search-bar i {
            color: #5a6e85;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
        }

        .nav-right {
            display: flex;
            gap: 1rem;
        }

        .nav-icon {
            width: 42px;
            height: 42px;
            background: #f0f4fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-icon:hover {
            background: #e2e8f0;
        }

        /* Profile menu */
        .profile-menu {
            position: absolute;
            top: 75px;
            right: 2rem;
            background: white;
            width: 280px;
            border-radius: 20px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 1rem;
            display: none;
            z-index: 200;
        }

        .profile-menu.show {
            display: block;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eef2f6;
        }

        .profile-header i {
            font-size: 2.5rem;
            color: #2c6e9e;
        }

        .profile-name {
            font-weight: 700;
        }

        .profile-email {
            font-size: 0.75rem;
            color: #5f7f9e;
        }

        .profile-menu-items a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            color: #1e2a3e;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.1s;
            cursor: pointer;
        }

        .profile-menu-items a:hover {
            background: #f0f6fe;
        }

        .divider {
            height: 1px;
            background: #edf2f7;
            margin: 8px 0;
        }

        /* Main Tabs */
        .main-tabs {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 2rem;
        }

        .tabs-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 2rem;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 1rem 0;
            font-weight: 500;
            color: #5a6e85;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }

        .tab.active {
            color: #1e5b9e;
            border-bottom-color: #1e5b9e;
        }

        .tab:hover:not(.active) {
            color: #2c3e66;
            border-bottom-color: #cbd5e1;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #2c3e50;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #2c3e50;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search Filter */
        .search-filter-section {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border-color: transparent;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 25px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table tbody tr:hover {
            background: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .action-btn.view {
            background: #3498db20;
            color: #3498db;
        }

        .action-btn.edit {
            background: #f39c1220;
            color: #f39c12;
        }

        .action-btn.delete {
            background: #e74c3c20;
            color: #e74c3c;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        .modal-header h2 {
            color: white;
            font-size: 1.3rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: white;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2a5298;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e293b;
            color: white;
            padding: 12px 22px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .search-filter-section {
                flex-direction: column;
            }
            .filter-buttons {
                width: 100%;
                justify-content: center;
            }
            .tabs-container {
                gap: 1rem;
            }
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="navigateTo('home.html')">
            <i class="fas fa-hospital-alt"></i> TOJI-KAN
        </div>
        <div class="nav-center">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="patientSearch" placeholder="Search patients..." onkeyup="searchPatients()">
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-icon profile-icon" onclick="toggleProfileMenu()">
                <i class="far fa-user-circle"></i>
            </div>
        </div>
    </div>
    
    <div class="profile-menu" id="profileMenu">
        <div class="profile-header">
            <i class="fas fa-user-md"></i>
            <div>
                <div class="profile-name" id="profileName">Loading...</div>
                <div class="profile-email" id="profileEmail">Loading...</div>
            </div>
        </div>
        <div class="profile-menu-items">
            <a onclick="showToast('Profile section coming soon')"><i class="fas fa-user"></i> My Profile</a>
            <div class="divider"></div>
            <a onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</div>

<div class="main-tabs">
    <div class="tabs-container">
        <div class="tab" onclick="navigateTo('home.html')"><i class="fas fa-chart-pie"></i> Dashboard</div>
        <div class="tab active" onclick="navigateTo('patients.html')"><i class="fas fa-users"></i> Patients</div>
        <div class="tab" onclick="navigateTo('staff.html')"><i class="fas fa-user-md"></i> Staff</div>
        <div class="tab" onclick="navigateTo('wards.html')"><i class="fas fa-procedures"></i> Wards</div>
        <div class="tab" onclick="navigateTo('appointments.html')"><i class="fas fa-calendar-check"></i> Appointments</div>
        <div class="tab" onclick="navigateTo('billing.html')"><i class="fas fa-file-invoice-dollar"></i> Billing</div>
    </div>
</div>

<main class="container">
    <div class="page-header">
        <h1><i class="fas fa-users"></i> Patient Management</h1>
        <button class="btn-primary" onclick="showRegisterModal()">
            <i class="fas fa-user-plus"></i> Register New Patient
        </button>
    </div>

    <div class="search-filter-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by name, ID, phone..." onkeyup="searchPatients()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterPatients('all', this)">All</button>
            <button class="filter-btn" onclick="filterPatients('newborn', this)">New Born</button>
            <button class="filter-btn" onclick="filterPatients('middle', this)">Middle Age</button>
            <button class="filter-btn" onclick="filterPatients('old', this)">Old Age</button>
        </div>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr><th>ID</th><th>Patient Name</th><th>Age</th><th>Gender</th><th>Contact</th><th>Ward</th><th>Actions</th></tr>
            </thead>
            <tbody id="patientsTableBody"></tbody>
        </table>
    </div>
</main>

<!-- Register Patient Modal -->
<div class="modal" id="patientModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-plus"></i> Register New Patient</h2>
            <button class="close-btn" onclick="closePatientModal()">&times;</button>
        </div>
        <form id="patientForm" onsubmit="savePatient(event)" style="padding: 2rem;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div>
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="gender" required>
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" rows="3"></textarea>
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid #f0f0f0;">
                <h3 style="margin-bottom: 1rem;">Ward Assignment (Optional)</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Ward Section</label>
                        <select id="ward">
                            <option value="">Select Ward</option>
                            <option value="newborn">New Born Ward</option>
                            <option value="middle">Middle Age Ward</option>
                            <option value="old">Old Age Ward</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Room Number</label>
                        <input type="text" id="room" placeholder="e.g., 201A">
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; padding-top: 1.5rem; border-top: 2px solid #f0f0f0;">
                <button type="button" class="btn-secondary" onclick="closePatientModal()">Cancel</button>
                <button type="submit" class="btn-primary">Register Patient</button>
            </div>
        </form>
    </div>
</div>

<!-- View Patient Modal -->
<div class="modal" id="viewPatientModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user"></i> Patient Details</h2>
            <button class="close-btn" onclick="closeViewModal()">&times;</button>
        </div>
        <div id="patientDetails" style="padding: 2rem;"></div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCkkqW21TMAy4NSA217k_fovsdavkF06s",
    authDomain: "tojikan-hospital.firebaseapp.com",
    projectId: "tojikan-hospital",
    storageBucket: "tojikan-hospital.firebasestorage.app",
    messagingSenderId: "1065678945107",
    appId: "1:1065678945107:web:cd95704090e3306b5ebfa6",
    measurementId: "G-MJ1SSXKFWQ"
  };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let patients = [];
    let currentFilter = 'all';
    let searchTerm = '';

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2500);
    }
    window.showToast = showToast;

    window.navigateTo = function(page) {
        window.location.href = page;
    };

    async function loadPatients() {
        const q = query(collection(db, "patients"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        patients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        displayPatients();
    }

    function calculateAge(dob) {
        if (!dob) return 'N/A';
        const birthDate = new Date(dob);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        return age;
    }

    function getAgeCategory(age) {
        if (age <= 1) return 'newborn';
        if (age < 50) return 'middle';
        return 'old';
    }

    function displayPatients() {
        let filtered = [...patients];
        
        if (searchTerm) {
            filtered = filtered.filter(p => 
                (p.firstName + ' ' + p.lastName).toLowerCase().includes(searchTerm) ||
                p.phone?.includes(searchTerm) ||
                p.patientId?.toLowerCase().includes(searchTerm)
            );
        }
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(p => {
                const age = calculateAge(p.dob);
                const category = getAgeCategory(age);
                return category === currentFilter;
            });
        }
        
        const tbody = document.getElementById('patientsTableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 3rem;">No patients found</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map(p => `
            <tr>
                <td>${p.patientId || p.id.slice(0, 8)}</td>
                <td><strong>${p.firstName} ${p.lastName}</strong></td>
                <td>${calculateAge(p.dob)} yrs</td>
                <td>${p.gender || 'N/A'}</td>
                <td>${p.phone || 'N/A'}</td>
                <td><span class="badge">${p.ward || 'Not Assigned'}</span></td>
                <td class="action-buttons">
                    <button class="action-btn view" onclick="viewPatient('${p.id}')"><i class="fas fa-eye"></i></button>
                    <button class="action-btn delete" onclick="deletePatient('${p.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    window.searchPatients = function() {
        searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        displayPatients();
    };

    window.filterPatients = function(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayPatients();
    };

    window.showRegisterModal = function() {
        document.getElementById('patientForm').reset();
        document.getElementById('patientModal').classList.add('active');
    };

    window.closePatientModal = function() {
        document.getElementById('patientModal').classList.remove('active');
    };

    window.savePatient = async function(event) {
        event.preventDefault();
        
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const dob = document.getElementById('dob').value;
        const gender = document.getElementById('gender').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const address = document.getElementById('address').value;
        const ward = document.getElementById('ward').value;
        const room = document.getElementById('room').value;
        
        const patientId = 'P' + new Date().getFullYear() + String(patients.length + 1).padStart(4, '0');
        
        const newPatient = {
            patientId: patientId,
            firstName: firstName,
            lastName: lastName,
            dob: dob,
            gender: gender,
            phone: phone,
            email: email,
            address: address,
            ward: ward,
            room: room,
            createdAt: new Date().toISOString()
        };
        
        await addDoc(collection(db, "patients"), newPatient);
        closePatientModal();
        await loadPatients();
        showToast('✅ Patient registered successfully!');
    };

    window.viewPatient = async function(id) {
        const patient = patients.find(p => p.id === id);
        if (!patient) return;
        
        const age = calculateAge(patient.dob);
        
        const details = `
            <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 15px;">
                <h3>${patient.firstName} ${patient.lastName}</h3>
                <p><strong>Patient ID:</strong> ${patient.patientId || patient.id.slice(0, 8)}</p>
                <p><strong>Date of Birth:</strong> ${patient.dob} (${age} years)</p>
                <p><strong>Gender:</strong> ${patient.gender || 'N/A'}</p>
                <p><strong>Phone:</strong> ${patient.phone || 'N/A'}</p>
                <p><strong>Email:</strong> ${patient.email || 'N/A'}</p>
                <p><strong>Address:</strong> ${patient.address || 'N/A'}</p>
                <p><strong>Ward:</strong> ${patient.ward || 'Not Assigned'}</p>
                <p><strong>Room:</strong> ${patient.room || 'Not Assigned'}</p>
                <p><strong>Registered:</strong> ${new Date(patient.createdAt).toLocaleDateString()}</p>
            </div>
        `;
        
        document.getElementById('patientDetails').innerHTML = details;
        document.getElementById('viewPatientModal').classList.add('active');
    };

    window.closeViewModal = function() {
        document.getElementById('viewPatientModal').classList.remove('active');
    };

    window.deletePatient = async function(id) {
        if (confirm('Are you sure you want to delete this patient? This action cannot be undone.')) {
            await deleteDoc(doc(db, "patients", id));
            await loadPatients();
            showToast('✅ Patient deleted successfully');
        }
    };

    window.toggleProfileMenu = function() {
        document.getElementById('profileMenu').classList.toggle('show');
    };

    window.logoutUser = async function() {
        if (confirm('Are you sure you want to logout?')) {
            await signOut(auth);
            sessionStorage.removeItem('togikan_currentUser');
            window.location.href = 'index.html';
        }
    };

    function updateUserProfile(user) {
        document.getElementById('profileName').textContent = user.displayName || user.email.split('@')[0];
        document.getElementById('profileEmail').textContent = user.email;
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = 'index.html';
        else { updateUserProfile(user); loadPatients(); }
    });

    document.addEventListener('click', (e) => {
        const menu = document.getElementById('profileMenu');
        if (menu && !e.target.closest('.profile-icon') && !e.target.closest('#profileMenu')) menu.classList.remove('show');
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closePatientModal();
            closeViewModal();
        }
    });
    
    window.searchPatients = searchPatients;
    window.filterPatients = filterPatients;
    window.showRegisterModal = showRegisterModal;
    window.closePatientModal = closePatientModal;
    window.savePatient = savePatient;
    window.viewPatient = viewPatient;
    window.closeViewModal = closeViewModal;
    window.deletePatient = deletePatient;
    window.toggleProfileMenu = toggleProfileMenu;
    window.logoutUser = logoutUser;
    window.navigateTo = navigateTo;
</script>
</body>
</html>
